server:
  port: 8080

spring:
  application:
    name: pointtrack

  error:
    include-stacktrace: never

  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:mysql://pointtrack-db:3306/pointtrack_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

security:
  jwt:
    secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    issuer: ${JWT_ISSUER:pointtrack}
    expiry-time-in-seconds: 86400       # 24 hours
    refreshable-duration: 604800        # 7 days

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  turnstile:
    secret-key: ${TURNSTILE_SECRET_KEY:1x0000000000000000000000000000000AA}
    url: "https://challenges.cloudflare.com/turnstile/v0/siteverify"
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  cookie:
    secure: ${APP_COOKIE_SECURE:true}
    same-site: ${APP_COOKIE_SAME_SITE:Lax}

logging:
  level:
    root: INFO
    com.teco.pointtrack: INFO
